<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>La María Piscícola</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐟</text></svg>"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:#f0f4f8;-webkit-tap-highlight-color:transparent}
input,select,textarea,button{font-family:inherit}
::-webkit-scrollbar{height:4px;width:4px}
::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:4px}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/recharts/2.12.7/Recharts.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<script>
var FB_URL="https://la-maria-piscicola-default-rtdb.firebaseio.com";
window.storage={
  get:function(key){return fetch(FB_URL+"/"+encodeURIComponent(key)+".json").then(function(r){return r.json()}).then(function(v){return v!=null?{key:key,value:typeof v==="string"?v:JSON.stringify(v)}:null}).catch(function(){return null})},
  set:function(key,value){return fetch(FB_URL+"/"+encodeURIComponent(key)+".json",{method:"PUT",body:JSON.stringify(value),headers:{"Content-Type":"application/json"}}).then(function(r){return r.json()}).then(function(v){return{key:key,value:typeof v==="string"?v:JSON.stringify(v)}}).catch(function(){return null})},
  delete:function(key){return fetch(FB_URL+"/"+encodeURIComponent(key)+".json",{method:"DELETE"}).then(function(){return{key:key,deleted:true}}).catch(function(){return null})},
  list:function(prefix){return fetch(FB_URL+"/.json?shallow=true").then(function(r){return r.json()}).then(function(v){var keys=Object.keys(v||{});if(prefix)keys=keys.filter(function(k){return k.indexOf(prefix)===0});return{keys:keys}}).catch(function(){return{keys:[]}})}
};
</script>
<script type="text/babel" src="la_maria_piscicola.jsx"></script>
</body>
</html>
